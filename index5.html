<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بازی سودوکو</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<style>
  body {
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 20px;
    background-color: #f5f5f5;
  }
  h1 {
    margin-bottom: 20px;
  }
  table {
    border-collapse: collapse;
  }
  td {
    border: 1px solid #333;
    width: 40px;
    height: 40px;
    text-align: center;
    font-size: 20px;
    padding: 0;
  }
  input {
    width: 100%;
    height: 100%;
    border: none;
    text-align: center;
    font-size: 20px;
  }
  input:focus {
    outline: 2px solid #007BFF;
  }
  .thick-border-right {
    border-right: 3px solid #333;
  }
  .thick-border-bottom {
    border-bottom: 3px solid #333;
  }
  button {
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
  }
</style>
</head>
<body>
<h1>بازی سودوکو</h1>
<table id="sudoku"></table>
<button onclick="checkSudoku()">بررسی جواب</button>

<script>
const board = [
  [5, 3, '', '', 7, '', '', '', ''],
  [6, '', '', 1, 9, 5, '', '', ''],
  ['', 9, 8, '', '', '', '', 6, ''],
  [8, '', '', '', 6, '', '', '', 3],
  [4, '', '', 8, '', 3, '', '', 1],
  [7, '', '', '', 2, '', '', '', 6],
  ['', 6, '', '', '', '', 2, 8, ''],
  ['', '', '', 4, 1, 9, '', '', 5],
  ['', '', '', '', 8, '', '', 7, 9]
];

function createBoard() {
  const table = document.getElementById('sudoku');
  for (let i = 0; i < 9; i++) {
    const row = document.createElement('tr');
    for (let j = 0; j < 9; j++) {
      const cell = document.createElement('td');
      if (board[i][j] !== '') {
        cell.textContent = board[i][j];
      } else {
        const input = document.createElement('input');
        input.type = 'number';
        input.min = 1;
        input.max = 9;
        input.dataset.row = i;
        input.dataset.col = j;
        cell.appendChild(input);
      }
      if ((j + 1) % 3 === 0 && j !== 8) cell.classList.add('thick-border-right');
      if ((i + 1) % 3 === 0 && i !== 8) cell.classList.add('thick-border-bottom');
      row.appendChild(cell);
    }
    table.appendChild(row);
  }
}

function checkSudoku() {
  const inputs = document.querySelectorAll('input');
  let valid = true;

  for (let input of inputs) {
    const row = parseInt(input.dataset.row);
    const col = parseInt(input.dataset.col);
    const value = parseInt(input.value);

    if (!value || value < 1 || value > 9) {
      valid = false;
      input.style.backgroundColor = '#f88';
      continue;
    } else {
      input.style.backgroundColor = '';
    }

    // Check row
    for (let c = 0; c < 9; c++) {
      if (c !== col && board[row][c] == value) valid = false;
    }
    // Check column
    for (let r = 0; r < 9; r++) {
      if (r !== row && board[r][col] == value) valid = false;
    }
    // Check 3x3 box
    const startRow = Math.floor(row / 3) * 3;
    const startCol = Math.floor(col / 3) * 3;
    for (let r = startRow; r < startRow + 3; r++) {
      for (let c = startCol; c < startCol + 3; c++) {
        if ((r !== row || c !== col) && board[r][c] == value) valid = false;
      }
    }
  }

  if (valid) {
    alert('تبریک! جواب درست است 🎉');
  } else {
    alert('چند خانه اشتباه هستند. لطفاً دوباره بررسی کنید.');
  }
}

createBoard();
</script>
</body>
</html>

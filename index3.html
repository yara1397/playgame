<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مافیا حرفه‌ای مخفی 😈🎭</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;font-family:'Vazirmatn',sans-serif;}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    max-width:500px;
    width:100%;
    text-align:center;
    background:rgba(255,255,255,0.08);
    padding:30px;
    border-radius:15px;
}

input{
    padding:10px;
    border-radius:8px;
    border:none;
    margin-top:10px;
    width:80%;
    text-align:center;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    margin-top:10px;
    background:#ff512f;
    color:white;
    cursor:pointer;
}

.role-box{
    margin-top:20px;
    padding:20px;
    background:rgba(255,255,255,0.15);
    border-radius:10px;
    font-size:20px;
}
</style>
</head>

<body>

<div class="container">

<h2>🎭 مافیا حرفه‌ای</h2>

<div id="setup">
<input type="number" id="playerCount" placeholder="چند نفر هستید؟ (حداقل 6)">
<br>
<input type="number" id="mafiaCount" placeholder="چند تا مافیا میخواید؟">
<br>
<button onclick="startGame()">شروع بازی</button>
</div>

<div id="game" style="display:none;">
<h3 id="playerTitle"></h3>
<button onclick="showRole()">نمایش نقش 👀</button>
<div class="role-box" id="roleBox" style="display:none;"></div>
<button onclick="nextPlayer()" id="nextBtn" style="display:none;">نفر بعدی ➡</button>
</div>

</div>

<script>

let rolesData = JSON.parse(localStorage.getItem("mafiaSecretRoles")) || [];
let currentPlayer = 0;

function saveGame(){
    localStorage.setItem("mafiaSecretRoles", JSON.stringify(rolesData));
}

function shuffle(array){
    return array.sort(() => Math.random() - 0.5);
}

function startGame(){

    const totalPlayers = parseInt(document.getElementById("playerCount").value);
    const mafiaNumber = parseInt(document.getElementById("mafiaCount").value);

    if(totalPlayers < 6){
        alert("حداقل ۶ نفر لازمه 😎");
        return;
    }

    if(mafiaNumber < 1 || mafiaNumber >= totalPlayers){
        alert("تعداد مافیا درست نیست 😈");
        return;
    }

    let roles = [];

    // رئیس مافیا
    roles.push("👑 رئیس مافیا");

    // بقیه مافیا
    for(let i=1;i<mafiaNumber;i++){
        roles.push("🔴 مافیا");
    }

    // دکتر لکتر (عضو مافیا ویژه)
    roles.push("⚡ دکتر لکتر");

    // نقش‌های شهر
    const cityRoles = [
        "🟢 دکتر",
        "🔵 کارآگاه",
        "🔫 تک‌تیرانداز"
    ];

    for(let role of cityRoles){
        if(roles.length < totalPlayers){
            roles.push(role);
        }
    }

    // بقیه شهروند
    while(roles.length < totalPlayers){
        roles.push("⚪ شهروند");
    }

    rolesData = shuffle(roles);
    currentPlayer = 0;

    saveGame();

    document.getElementById("setup").style.display="none";
    document.getElementById("game").style.display="block";

    updatePlayer();
}

function updatePlayer(){
    document.getElementById("playerTitle").textContent =
        "بازیکن " + (currentPlayer+1) + " آماده باش 👀";
    document.getElementById("roleBox").style.display="none";
    document.getElementById("nextBtn").style.display="none";
}

function showRole(){
    const roleBox = document.getElementById("roleBox");
    roleBox.style.display="block";
    roleBox.textContent = rolesData[currentPlayer];
    document.getElementById("nextBtn").style.display="inline-block";
}

function nextPlayer(){
    currentPlayer++;

    if(currentPlayer >= rolesData.length){
        alert("همه نقش‌ها دیده شد 😈 بازی شروع شود!");
        localStorage.removeItem("mafiaSecretRoles");
        location.reload();
        return;
    }

    updatePlayer();
}

if(rolesData.length > 0){
    document.getElementById("setup").style.display="none";
    document.getElementById("game").style.display="block";
    updatePlayer();
}

</script>

</body>
</html>
